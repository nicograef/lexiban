# ── Nginx Reverse Proxy — Production (HTTPS) ──
# TLS termination + routing for Lexiban.
#
# IMPORTANT: Replace YOURDOMAIN.COM with your actual domain everywhere
# in this file before deploying (e.g. iban.nicograef.dev).
#
# Architecture:
#   Browser → :443 → this reverse-proxy
#                       ├─ /api/*  → backend:8080  (Spring Boot)
#                       └─ /*      → frontend:80   (nginx serving SPA)

# Rate limiting for API requests
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── HTTP → HTTPS redirect + ACME challenges ──
server {
  listen 80;
  server_name YOURDOMAIN.COM www.YOURDOMAIN.COM;

  # Serve ACME http-01 challenge files for Let's Encrypt renewal
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all other HTTP traffic to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── Redirect www → non-www (HTTPS) ──
server {
  listen 443 ssl;
  http2 on;
  server_name www.YOURDOMAIN.COM;

  ssl_certificate /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:MozSSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  return 301 https://YOURDOMAIN.COM$request_uri;
}

# ── Primary HTTPS server ──
server {
  listen 443 ssl;
  http2 on;
  server_name YOURDOMAIN.COM;

  ssl_certificate /etc/letsencrypt/live/YOURDOMAIN.COM/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.COM/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:MozSSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  # Backend API — proxy /api/* to Spring Boot
  location /api/ {
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    proxy_pass http://backend:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Frontend SPA — proxy everything else to the frontend nginx
  location / {
    proxy_pass http://frontend:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}
