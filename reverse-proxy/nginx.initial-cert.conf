# ── Nginx — Initial Certificate Request ──
# Minimal HTTP server that only serves ACME challenges.
# Used once to obtain the first Let's Encrypt certificate.
#
# IMPORTANT: Replace YOURDOMAIN.COM with your actual domain.
#
# Usage:
#   1. docker compose -f docker-compose.initial-cert.yml up -d
#   2. docker exec iban-certbot certbot certonly \
#        --webroot -w /var/www/certbot \
#        -d YOURDOMAIN.COM -d www.YOURDOMAIN.COM \
#        --agree-tos --email your@email.com
#   3. docker compose -f docker-compose.initial-cert.yml down

server {
  listen 80;
  server_name YOURDOMAIN.COM www.YOURDOMAIN.COM;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
}
