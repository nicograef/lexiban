# ── Docker Compose — Production (HTTPS on VPS) ──
# Full stack with TLS via Let's Encrypt.
#
# Architecture:
#   Browser → :443 → reverse-proxy (nginx: TLS + routing)
#                       ├─ /api/*  → backend:8080
#                       └─ /*      → frontend:80
#   backend → postgres:5432 (internal network only)
#   certbot handles automatic certificate renewal.
#
# Prerequisites:
#   1. DNS A record pointing to the VPS IP
#   2. Initial certificate obtained via docker-compose.initial-cert.yml
#   3. .env file with POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB

name: lexiban

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:17
    container_name: lexiban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Spring Boot Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexiban-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - app-network
      - db-network
    depends_on:
      postgres:
        condition: service_healthy
    # No exposed ports — reachable only via reverse-proxy

  # ── React Frontend (nginx: static SPA files) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lexiban-frontend
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_started
    # No exposed ports — served via reverse-proxy

  # ── Reverse Proxy (nginx: TLS termination + routing) ──
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: lexiban-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-challenges:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - app-network
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started

  # ── Certbot (Let's Encrypt auto-renewal) ──
  certbot:
    image: certbot/certbot:v2.11.0
    container_name: lexiban-certbot
    restart: unless-stopped
    volumes:
      - certbot-challenges:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - app-network
    depends_on:
      reverse-proxy:
        condition: service_started
    entrypoint: /bin/sh
    command: -c "while true; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 24h; done"

networks:
  app-network:
    driver: bridge
  db-network:
    driver: bridge
    internal: true # postgres not reachable from outside

volumes:
  postgres-data:
  certbot-challenges:
  letsencrypt:
