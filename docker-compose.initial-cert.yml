# ── Docker Compose — Initial Certificate Request ──
# Minimal stack to obtain the first Let's Encrypt certificate.
# Only runs nginx (for ACME challenges) and certbot.
#
# Usage:
#   1. make cert-init
#   2. Follow the certbot prompts / check logs
#   3. make cert-down
#   4. make prod-up   ← start the full production stack

name: lexiban

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: lexiban-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./reverse-proxy/nginx.initial-cert.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-challenges:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - app-network

  certbot:
    image: certbot/certbot:v2.11.0
    container_name: lexiban-certbot
    restart: unless-stopped
    volumes:
      - certbot-challenges:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - app-network
    depends_on:
      reverse-proxy:
        condition: service_started
    entrypoint: /bin/sh
    command: -c "while true; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"

networks:
  app-network:
    driver: bridge

volumes:
  certbot-challenges:
  letsencrypt:
