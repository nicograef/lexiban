# ── Docker Compose — Initial Certificate Request ──
# Minimal nginx that only serves ACME challenges.
# Used by scripts/prod-init.sh (or manually) to obtain the first
# Let's Encrypt certificate before the full prod stack can start.
#
# Automated (recommended):
#   make prod-init          ← handles everything in one step
#
# Manual:
#   1. make cert-init
#   2. docker run --rm \
#        -v lexiban_certbot-challenges:/var/www/certbot \
#        -v lexiban_letsencrypt:/etc/letsencrypt \
#        certbot/certbot:v2.11.0 certonly \
#          --webroot -w /var/www/certbot \
#          -d lexiban.nicograef.de -d www.lexiban.nicograef.de \
#          --agree-tos --email your@email.com --non-interactive
#   3. make cert-down
#   4. make prod-up

name: lexiban

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: lexiban-reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./reverse-proxy/nginx.initial-cert.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-challenges:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  certbot-challenges:
  letsencrypt:
