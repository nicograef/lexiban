# ── Docker Compose — Local Development / Preview ──
# Starts all services for local testing without TLS.
# For production deployment on a VPS, use docker-compose.prod.yml instead.
#
# Architecture (simplified — no TLS, no separate reverse-proxy):
#   Browser → :80 → frontend (nginx: static files + /api proxy) → backend:8080
#   backend → postgres:5432
#
# The frontend's nginx serves the SPA AND proxies /api/* to the backend.
# This eliminates the need for a separate reverse-proxy container in local dev.

name: iban

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:17
    container_name: iban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Spring Boot Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iban-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Frontend (Nginx: static files + API proxy) ──
  # Serves the Vite-built SPA and proxies /api/* to the backend.
  # This single container replaces both the old frontend + reverse-proxy.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iban-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres-data:
