name: Deploy presentation

on:
  push:
    branches: ["main"]
    paths:
      - "presentation/**"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: presentation/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: presentation

      - name: Build
        run: pnpm build
        working-directory: presentation

      - name: Deploy
        run: |
          sudo apt-get install -y sshpass rsync
          sshpass -p '${{ secrets.FTP_PASSWORD }}' rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            presentation/dist/ ${{ secrets.FTP_USER }}@${{ secrets.FTP_HOST }}:/home/www/lexiban-slides/
