# ── application.properties ──
# This is Spring Boot's central configuration file.
# ≈ .env file in Node.js projects, or config.yaml in Go.
#
# ${VAR:default} syntax reads environment variables with a fallback.
# ≈ process.env.VAR ?? 'default' in Node.js.
#
# Spring supports profiles (dev, prod, test) via application-{profile}.properties
# files that override values from this base file.
# ≈ .env.development / .env.production in Vite/CRA.

spring.application.name=iban-validator

# ── Database connection ──
# JDBC URL format: jdbc:postgresql://host:port/database
# ≈ DATABASE_URL=postgresql://admin:admin@localhost:5432/iban in Node.js
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/iban}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# ── JPA / Hibernate ──
# ddl-auto=validate — Hibernate checks that entity classes match the DB schema
# at startup but does NOT modify it. Schema changes are managed by Flyway.
# Other options: none, update (auto-alter tables), create-drop (reset on restart).
# ≈ In Prisma: prisma db pull to validate, prisma migrate deploy to apply.
spring.jpa.hibernate.ddl-auto=validate
# open-in-view=false — disables the "Open Session in View" anti-pattern.
# This prevents lazy-loading DB queries during response rendering.
# Best practice: all DB access happens in the service/repository layer.
spring.jpa.open-in-view=false

# ── Flyway (database migrations) ──
# Flyway runs SQL migration scripts on startup, in version order.
# ≈ prisma migrate deploy (TS) or golang-migrate (Go)
# Migration files live in src/main/resources/db/migration/
# Naming convention: V1__description.sql, V2__description.sql, ...
# Flyway tracks which migrations have already run in a "flyway_schema_history" table.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Embedded server ──
# Spring Boot includes an embedded Tomcat server (no external server needed).
# ≈ app.listen(8080) in Express or http.ListenAndServe(":8080", ...) in Go.
server.port=8080
