spring.application.name=lexiban

# ── Database connection ──
# DB_HOST defaults to localhost for local dev; docker-compose sets it to "postgres".
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

# ── JPA / Hibernate ──
# validate = Hibernate checks entity-to-schema match but never modifies the DB.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway (database migrations) ──
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Embedded server ──
server.port=8080
