# ── Dev profile configuration ──
# This file is loaded when the "dev" profile is active.
# It overrides values from the base application.properties.
# Activate with: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# ≈ NODE_ENV=development in Node.js / Vite's mode system.

spring.application.name=iban-validator

# Allow CORS from the Vite dev server (port 5173) and localhost.
# This value is read by CorsConfig.java via @Value("${app.cors.allowed-origins}").
# In production, CORS is not needed because the nginx reverse proxy serves
# both frontend and backend from the same origin.
app.cors.allowed-origins=http://localhost,http://localhost:5173
