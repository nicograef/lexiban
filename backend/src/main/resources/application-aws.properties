# ── AWS profile ──
# Activate with: SPRING_PROFILES_ACTIVE=aws (set via Lambda environment variable)

# DB connection via RDS Proxy endpoint (injected from Secrets Manager)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Lambda doesn't benefit from connection pooling — RDS Proxy handles it
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000

# ── SnapStart ──
# During the SnapStart snapshot Spring Boot boots without network access,
# so all DB activity must be deferred to the first real invocation.
# Lazy init ensures DataSource, Flyway, and JPA beans are only created
# when first needed (i.e. on the first HTTP request after restore).
spring.main.lazy-initialization=true
