# ── AWS profile ──
# Activate with: SPRING_PROFILES_ACTIVE=aws (set via Lambda environment variable)

# DB connection via RDS Proxy endpoint (injected from Secrets Manager)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Lambda doesn't benefit from connection pooling — RDS Proxy handles it
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000

# ── SnapStart compatibility ──
# SnapStart snapshots the JVM before network is available.
# All DB access during Spring context init must be prevented.

# Flyway migrations run in a separate Lambda (FlywayMigrationHandler) during deployment.
spring.flyway.enabled=false
# No schema validation at startup — migrations already ensure correctness.
spring.jpa.hibernate.ddl-auto=none
# Suppress HikariCP fail-fast so the pool starts without a DB connection.
spring.datasource.hikari.initialization-fail-timeout=-1
# Hibernate normally auto-detects the dialect via JDBC — set explicitly to avoid the connection.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
